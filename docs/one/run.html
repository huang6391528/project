<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>绿动校园 - 校园跑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes dash {
            to { stroke-dashoffset: 0; }
        }
        .path-anim {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 5s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen">
<div class="w-[375px] h-[812px] bg-white rounded-[3rem] overflow-hidden relative shadow-2xl border-[8px] border-slate-800 flex flex-col">
<!-- Header -->
<div class="px-6 pt-10 flex justify-around border-b border-slate-50 sticky top-0 bg-white z-10">
<button class="pb-3 border-b-2 border-emerald-500 text-emerald-500 font-bold text-sm">自由跑</button>
<button class="pb-3 border-b-2 border-transparent text-slate-400 font-medium text-sm">晨跑计划</button>
<button class="pb-3 border-b-2 border-transparent text-slate-400 font-medium text-sm">马拉松训练</button>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar pb-20">
<!-- Hand-drawn Map Section -->
<div class="relative w-full h-[320px] bg-emerald-50 overflow-hidden">
<img alt="Campus Hand-drawn Map" class="w-full h-full object-cover opacity-50" src="https://modao.cc/agent-py/media/generated_images/2026-04-05/ea61832783f24d68b95e062219df4287.jpg"/>
<!-- SVG Route Animation -->
<svg class="absolute inset-0 w-full h-full" viewbox="0 0 375 320">
<path class="path-anim" d="M50,250 Q100,100 200,150 T320,80" fill="none" stroke="#10b981" stroke-linecap="round" stroke-width="6"></path>
<circle cx="50" cy="250" fill="#10b981" r="6"></circle>
<circle class="animate-ping" cx="320" cy="80" fill="#10b981" r="8"></circle>
</svg>
<!-- Floating Info -->
<div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-2">
<iconify-icon class="text-blue-400" icon="mdi:weather-partly-cloudy"></iconify-icon>
<span class="text-[10px] font-bold text-slate-700">18°C · 空气优</span>
</div>
</div>
<!-- Run Stats -->
<div class="p-6 bg-white -mt-10 relative rounded-t-[2.5rem] shadow-[0_-20px_40px_rgba(0,0,0,0.05)]">
<div class="grid grid-cols-2 gap-y-6 text-center">
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">时长</p>
<p class="text-2xl font-black text-slate-800">00:24:18</p>
</div>
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">距离 (KM)</p>
<p class="text-2xl font-black text-slate-800">4.25</p>
</div>
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">当前配速</p>
<p class="text-2xl font-black text-slate-800">5'12"</p>
</div>
<div>
<p class="text-[10px] text-slate-400 uppercase tracking-wider">累计减排 (g)</p>
<p class="text-2xl font-black text-emerald-500">642</p>
</div>
</div>
<!-- Controls -->
<div class="mt-10 flex justify-center items-center space-x-8">
<button class="w-14 h-14 bg-slate-50 rounded-full flex items-center justify-center text-slate-400">
<iconify-icon class="text-2xl" icon="mdi:pause"></iconify-icon>
</button>
<button class="w-24 h-24 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-xl shadow-emerald-200 active:scale-95 transition-transform">
<iconify-icon class="text-5xl" icon="mdi:play"></iconify-icon>
</button>
<button class="w-14 h-14 bg-slate-50 rounded-full flex items-center justify-center text-slate-400">
<iconify-icon class="text-2xl" icon="mdi:stop"></iconify-icon>
</button>
</div>
<p class="text-center mt-6 text-[10px] text-slate-400">累计已跑里程: <span class="text-slate-800 font-bold uppercase">152.4 KM</span></p>
</div>
<!-- Calendar Grid -->
<div class="px-6 mt-4">
<div class="bg-slate-50 rounded-3xl p-5">
<div class="flex justify-between items-center mb-4">
<h4 class="font-bold text-slate-800 text-xs tracking-wide">4月 运动轨迹</h4>
<span class="text-[10px] text-emerald-600 font-bold uppercase">Run 8 Days</span>
</div>
<div class="grid grid-cols-7 gap-2">
<!-- Header Weekdays -->
<span class="text-[8px] text-slate-300 text-center font-bold">MON</span>
<span class="text-[8px] text-slate-300 text-center font-bold">TUE</span>
<span class="text-[8px] text-slate-300 text-center font-bold">WED</span>
<span class="text-[8px] text-slate-300 text-center font-bold">THU</span>
<span class="text-[8px] text-slate-300 text-center font-bold">FRI</span>
<span class="text-[8px] text-slate-300 text-center font-bold">SAT</span>
<span class="text-[8px] text-slate-300 text-center font-bold">SUN</span>
<!-- Calendar Days -->
<div class="h-8 flex items-center justify-center text-[10px] text-slate-200">30</div>
<div class="h-8 flex items-center justify-center text-[10px] bg-emerald-100 text-emerald-600 rounded-lg font-bold relative ring-2 ring-emerald-50 ring-offset-1">1<div class="absolute -top-1 -right-1 w-2 h-2 bg-orange-400 rounded-full border-2 border-white"></div></div>
<div class="h-8 flex items-center justify-center text-[10px] bg-emerald-500 text-white rounded-lg font-bold shadow-md shadow-emerald-100 scale-110">2</div>
<div class="h-8 flex items-center justify-center text-[10px] bg-emerald-100 text-emerald-600 rounded-lg font-bold">3</div>
<div class="h-8 flex items-center justify-center text-[10px] text-slate-400">4</div>
<div class="h-8 flex items-center justify-center text-[10px] bg-emerald-500 text-white rounded-lg font-bold">5</div>
<div class="h-8 flex items-center justify-center text-[10px] text-slate-400">6</div>
<div class="h-8 flex items-center justify-center text-[10px] text-slate-400">7</div>
<div class="h-8 flex items-center justify-center text-[10px] bg-emerald-100 text-emerald-600 rounded-lg font-bold">8</div>
<!-- ... more days -->
<div class="col-span-7 mt-2 text-center">
<p class="text-[8px] text-slate-300">浮起标记代表“晨跑打卡”完成</p>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Nav -->
<div class="h-20 bg-white border-t border-slate-50 flex justify-around items-center px-4 z-50">
<a class="flex flex-col items-center text-slate-400" href="index.html">
<iconify-icon class="text-2xl" icon="mdi:home-variant"></iconify-icon>
<span class="text-[10px] font-bold mt-1">首页</span>
</a>
<a class="flex flex-col items-center text-emerald-500" href="run.html">
<iconify-icon class="text-2xl" icon="mdi:run"></iconify-icon>
<span class="text-[10px] font-bold mt-1">校园跑</span>
</a>
<a class="flex flex-col items-center text-slate-400" href="action.html">
<iconify-icon class="text-2xl" icon="mdi:leaf"></iconify-icon>
<span class="text-[10px] font-bold mt-1">低碳</span>
</a>
<a class="flex flex-col items-center text-slate-400" href="store.html">
<iconify-icon class="text-2xl" icon="mdi:shopping-outline"></iconify-icon>
<span class="text-[10px] font-bold mt-1">商城</span>
</a>
<a class="flex flex-col items-center text-slate-400" href="profile.html">
<iconify-icon class="text-2xl" icon="mdi:account-outline"></iconify-icon>
<span class="text-[10px] font-bold mt-1">我的</span>
</a>
</div>
</div>
</body>
</html>
