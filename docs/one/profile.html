<script>
        window.onload = function() {
            const chartDom = document.getElementById('chart-behavior');
            const myChart = echarts.init(chartDom);
            const option = {
                radar: {
                    indicator: [
                        { name: '运动', max: 100 },
                        { name: '饮食', max: 100 },
                        { name: '出行', max: 100 },
                        { name: '回收', max: 100 },
                        { name: '节水', max: 100 }
                    ],
                    radius: '65%',
                    axisName: {
                        color: '#94a3b8',
                        fontSize: 8,
                        fontWeight: 'bold'
                    },
                    splitArea: { show: false },
                    splitLine: { lineStyle: { color: '#f1f5f9' } }
                },
                series: [{
                    type: 'radar',
                    data: [
                        {
                            value: [90, 70, 85, 60, 50],
                            name: '减排能力分布',
                            areaStyle: { color: 'rgba(16, 185, 129, 0.2)' },
                            lineStyle: { color: '#10b981', width: 2 },
                            itemStyle: { color: '#10b981' }
                        }
                    ]
                }]
            };
            myChart.setOption(option);
        };
    </script>
