<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>绿动校园 - 宿舍节能</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        .iphone-container {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: #f8fafc;
            border: 12px solid #1e293b;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .scroll-container {
            height: calc(100% - 64px);
            overflow-y: auto;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        .toggle-active { background-color: #22c55e; }
        .temp-dial {
            background: conic-gradient(from 180deg at 50% 50%, #3b82f6 0deg, #f59e0b 180deg, #3b82f6 360deg);
            mask: radial-gradient(transparent 55%, black 56%);
        }
    </style>
</head>
<body>
<div class="iphone-container">
<!-- 头部导航 -->
<div class="h-16 flex items-center px-4 bg-white border-b border-gray-50">
<a class="p-2" href="index.html">
<iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon>
</a>
<h1 class="flex-1 text-center font-bold text-lg mr-8">宿舍节能助手</h1>
</div>
<div class="scroll-container pb-24">
<!-- 1. 宿舍实时概况 -->
<div class="p-6 bg-white">
<div class="flex justify-between items-end mb-6">
<div>
<p class="text-gray-400 text-xs uppercase tracking-wider">我的寝室</p>
<h2 class="text-2xl font-black text-gray-800">C 栋 502</h2>
</div>
<div class="text-right">
<span class="text-green-500 font-bold text-sm flex items-center gap-1 justify-end">
<iconify-icon icon="mdi:leaf"></iconify-icon> 领先 92% 寝室
                        </span>
</div>
</div>
<!-- 空调控制卡片 -->
<div class="bg-blue-50 rounded-[32px] p-6 relative overflow-hidden">
<div class="flex justify-between items-center mb-6 relative z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white">
<iconify-icon class="text-2xl" icon="mdi:air-conditioner"></iconify-icon>
</div>
<span class="font-bold text-gray-700">空调温控</span>
</div>
<div class="w-12 h-6 bg-gray-200 rounded-full relative p-1 cursor-pointer">
<div class="w-4 h-4 bg-white rounded-full translate-x-6"></div>
</div>
</div>
<div class="flex flex-col items-center mb-4 relative z-10">
<div class="w-32 h-32 rounded-full border-4 border-white/50 flex flex-col items-center justify-center relative">
<span class="text-4xl font-black text-blue-600">26<span class="text-lg">°C</span></span>
<span class="text-[10px] text-gray-500">当前节能温度</span>
</div>
<p class="text-[10px] text-blue-400 mt-4 italic">“夏 26℃ 以上，冬 20℃ 以下更减碳”</p>
</div>
<!-- 减碳提示 -->
<div class="bg-blue-600/10 rounded-2xl p-3 flex items-center gap-3 relative z-10">
<iconify-icon class="text-blue-600" icon="mdi:lightbulb-on-outline"></iconify-icon>
<span class="text-[10px] text-blue-800">已保持节能运行 4.5 小时，预计减碳 120g</span>
</div>
</div>
</div>
<!-- 2. 快捷节能打卡列表 -->
<div class="px-6 mt-4 space-y-4">
<h3 class="font-bold text-gray-800">每日节能打卡</h3>
<!-- 节约用电 -->
<div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-50 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-yellow-50 rounded-xl flex items-center justify-center">
<iconify-icon class="text-2xl text-yellow-500" icon="mdi:lightbulb-variant"></iconify-icon>
</div>
<div>
<h4 class="text-sm font-bold text-gray-800">离开寝室关灯</h4>
<p class="text-[10px] text-gray-400">杜绝长明灯，从我做起</p>
</div>
</div>
<button class="bg-green-500 text-white text-xs px-4 py-2 rounded-full font-bold shadow-lg shadow-green-200">打卡</button>
</div>
<!-- 节约用水 -->
<div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-50 shadow-sm opacity-60">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center">
<iconify-icon class="text-2xl text-blue-500" icon="mdi:water"></iconify-icon>
</div>
<div>
<h4 class="text-sm font-bold text-gray-800">洗漱关水龙头</h4>
<p class="text-[10px] text-gray-400">已完成 1/1 次打卡</p>
</div>
</div>
<div class="bg-gray-100 text-gray-400 text-xs px-4 py-2 rounded-full font-bold italic">已达成</div>
</div>
<!-- 熄灯自律 -->
<div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-50 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center">
<iconify-icon class="text-2xl text-indigo-500" icon="mdi:bed"></iconify-icon>
</div>
<div>
<h4 class="text-sm font-bold text-gray-800">熄灯准时断电</h4>
<p class="text-[10px] text-gray-400">23:00 前完成打卡</p>
</div>
</div>
<button class="border border-green-500 text-green-500 text-xs px-4 py-2 rounded-full font-bold">待开启</button>
</div>
<!-- 待机节能 -->
<div class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-50 shadow-sm">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-rose-50 rounded-xl flex items-center justify-center">
<iconify-icon class="text-2xl text-rose-500" icon="mdi:power-plug-off"></iconify-icon>
</div>
<div>
<h4 class="text-sm font-bold text-gray-800">拔掉闲置充电器</h4>
<p class="text-[10px] text-gray-400">减少隐性电耗</p>
</div>
</div>
<button class="bg-green-500 text-white text-xs px-4 py-2 rounded-full font-bold shadow-lg shadow-green-200">打卡</button>
</div>
</div>
<!-- 3. 寝室节能排行榜（微型） -->
<div class="px-6 mt-8">
<div class="bg-slate-900 rounded-[32px] p-6 text-white relative overflow-hidden">
<div class="flex justify-between items-center mb-4">
<h3 class="font-bold">楼栋排名</h3>
<iconify-icon icon="mdi:chevron-right"></iconify-icon>
</div>
<div class="space-y-4">
<div class="flex items-center gap-3">
<span class="text-yellow-500 font-black italic">01</span>
<div class="flex-1">
<div class="flex justify-between text-[10px] mb-1">
<span>502 寝室 (我)</span>
<span>8,420 kg</span>
</div>
<div class="w-full bg-white/10 h-1 rounded-full">
<div class="bg-green-500 w-[85%] h-full rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<span class="text-gray-400 font-black italic">02</span>
<div class="flex-1">
<div class="flex justify-between text-[10px] mb-1">
<span>311 寝室</span>
<span>8,150 kg</span>
</div>
<div class="w-full bg-white/10 h-1 rounded-full">
<div class="bg-white/40 w-[80%] h-full rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- 背景装饰 -->
<iconify-icon class="absolute -bottom-4 -right-4 text-8xl text-white/5" icon="mdi:lightning-bolt"></iconify-icon>
</div>
</div>
</div>
<!-- 底部简单导航复用 -->
<div class="absolute bottom-0 left-0 right-0 h-20 bg-white border-t border-gray-100 flex items-center justify-around px-2">
<a class="flex flex-col items-center gap-1 text-gray-400" href="index.html">
<iconify-icon class="text-2xl" icon="mdi:home-outline"></iconify-icon>
<span class="text-[10px]">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="life.html">
<iconify-icon class="text-2xl" icon="mdi:leaf-outline"></iconify-icon>
<span class="text-[10px]">打卡</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="community.html">
<iconify-icon class="text-2xl" icon="mdi:trophy-outline"></iconify-icon>
<span class="text-[10px]">排行</span>
</a>
<a class="flex flex-col items-center gap-1 text-gray-400" href="profile.html">
<iconify-icon class="text-2xl" icon="mdi:account-outline"></iconify-icon>
<span class="text-[10px]">我的</span>
</a>
</div>
</div>
</body>
</html>
