<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>运动碳汇打卡 - 低碳校园</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; font-family: 'PingFang SC', system-ui; }
        .app-container { width: 375px; height: 812px; background: #fafafa; margin: 20px auto; border-radius: 40px; border: 8px solid #333; position: relative; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25); }
        .scroll-content { height: calc(812px - 140px); overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-content::-webkit-scrollbar { display: none; }
        .asset-card { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .bottom-nav { height: 84px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; text-decoration: none; transition: 0.3s; }
        .nav-item.active { color: #10b981; transform: translateY(-4px); }
        .card-neo { border-radius: 24px; padding: 16px; background: #fff; border: 1px solid #f0f0f0; transition: all 0.2s; }
        .card-neo:active { transform: scale(0.96); background: #f9f9f9; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 顶部资产信息 -->
<div class="px-6 pt-10 pb-2 flex justify-between items-center bg-white">
<span class="text-xl font-black text-gray-800 tracking-tighter">Campus<span class="text-emerald-500">Eco</span></span>
<div class="text-[10px] font-bold text-gray-400">2026.04.11</div>
</div>
<div class="scroll-content">
<!-- 碳资产区域 -->
<div class="mx-4 mt-4 p-5 rounded-[2rem] asset-card text-white shadow-lg relative overflow-hidden">
<div class="relative z-10">
<div class="flex justify-between items-start">
<div>
<p class="text-[10px] opacity-70">我的碳资产 (2026版)</p>
<h2 class="text-3xl font-black mt-1">2,840.50</h2>
</div>
<div class="text-right">
<p class="text-[10px] opacity-70">累计减排(kg)</p>
<p class="text-xl font-bold">125.4</p>
</div>
</div>
<div class="flex gap-2 mt-4">
<div class="flex items-center gap-1 bg-white/20 px-3 py-1.5 rounded-xl border border-white/10">
<iconify-icon class="text-yellow-400" icon="mdi:medal"></iconify-icon>
<span class="text-[10px] font-bold">运动达人</span>
</div>
<div class="flex items-center gap-1 bg-white/20 px-3 py-1.5 rounded-xl border border-white/10">
<iconify-icon class="text-emerald-200" icon="mdi:leaf"></iconify-icon>
<span class="text-[10px] font-bold">减碳先锋</span>
</div>
</div>
</div>
<iconify-icon class="absolute -right-4 -bottom-4 opacity-10 text-white" icon="mdi:forest" width="100"></iconify-icon>
</div>
<!-- 自动化步数采集 -->
<div class="mx-4 mt-6 bg-white p-6 rounded-[2rem] shadow-sm border border-emerald-50">
<div class="flex justify-between items-center">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
<span class="text-[10px] font-bold text-emerald-600 uppercase">Step Sync Active</span>
</div>
<h3 class="text-3xl font-black text-gray-800">8,432<span class="text-sm font-normal text-gray-400 ml-1">/10000</span></h3>
<p class="text-[10px] text-gray-400 mt-1">今日步数已同步 · 产出碳汇 +0.84 kg</p>
</div>
<div class="w-14 h-14 rounded-full border-4 border-emerald-100 flex items-center justify-center">
<iconify-icon class="text-emerald-500" icon="mdi:shoe-print" width="28"></iconify-icon>
</div>
</div>
</div>
<!-- 运动类型打卡项 -->
<div class="px-4 mt-8">
<div class="flex items-center justify-between mb-4 px-2">
<h4 class="font-bold text-gray-800">运动场景打卡</h4>
<span class="text-[10px] text-emerald-500 font-bold">滑动查看更多</span>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="card-neo bg-blue-50/50 border-blue-100">
<div class="w-10 h-10 bg-blue-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:run" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">户外跑步</h5>
<p class="text-[10px] text-blue-600 mt-1">每公里产出 +5 积分</p>
<button class="mt-4 w-full bg-blue-500 text-white text-[10px] py-2.5 rounded-xl font-bold">开启定位</button>
</div>
<div class="card-neo bg-orange-50/50 border-orange-100 relative">
<span class="absolute top-3 right-3 text-[8px] bg-orange-500 text-white px-2 py-0.5 rounded-full">专属审核</span>
<div class="w-10 h-10 bg-orange-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:school" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">体育课运动</h5>
<p class="text-[10px] text-orange-600 mt-1">积分上浮 20%</p>
<button class="mt-4 w-full bg-orange-500 text-white text-[10px] py-2.5 rounded-xl font-bold">拍照上传</button>
</div>
<div class="card-neo bg-purple-50/50 border-purple-100">
<div class="w-10 h-10 bg-purple-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:weight-lifter" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">健身塑形</h5>
<p class="text-[10px] text-purple-600 mt-1">瑜伽/跳绳/HIIT录入</p>
<button class="mt-4 w-full bg-purple-500 text-white text-[10px] py-2.5 rounded-xl font-bold">时长录入</button>
</div>
<div class="card-neo bg-amber-50/50 border-amber-100">
<div class="w-10 h-10 bg-amber-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:basketball" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">球类运动</h5>
<p class="text-[10px] text-amber-600 mt-1">篮足羽乒 · 计时打卡</p>
<button class="mt-4 w-full bg-amber-500 text-white text-[10px] py-2.5 rounded-xl font-bold">计时开始</button>
</div>
<div class="card-neo bg-cyan-50/50 border-cyan-100">
<div class="w-10 h-10 bg-cyan-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:pool" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">水上运动</h5>
<p class="text-[10px] text-cyan-600 mt-1">游泳及水上运动录入</p>
<button class="mt-4 w-full bg-cyan-500 text-white text-[10px] py-2.5 rounded-xl font-bold">数据填报</button>
</div>
<div class="card-neo bg-emerald-50/50 border-emerald-100">
<div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-white mb-3 shadow-md">
<iconify-icon icon="mdi:bike" width="24"></iconify-icon>
</div>
<h5 class="text-sm font-bold">骑行运动</h5>
<p class="text-[10px] text-emerald-600 mt-1">校园/户外骑行记录</p>
<button class="mt-4 w-full bg-emerald-500 text-white text-[10px] py-2.5 rounded-xl font-bold">绑定设备</button>
</div>
</div>
</div>
</div>
<!-- 底部导航栏 -->
<nav class="bottom-nav">
<a class="nav-item active" href="index.html">
<iconify-icon icon="mdi:run-fast" width="28"></iconify-icon>
<span class="text-[10px] font-bold">运动</span>
</a>
<a class="nav-item" href="travel.html">
<iconify-icon icon="mdi:bus-side" width="28"></iconify-icon>
<span class="text-[10px] font-bold">出行</span>
</a>
<a class="nav-item" href="diet.html">
<iconify-icon icon="mdi:silverware-variant" width="28"></iconify-icon>
<span class="text-[10px] font-bold">饮食</span>
</a>
<a class="nav-item" href="life.html">
<iconify-icon icon="mdi:home-heart" width="28"></iconify-icon>
<span class="text-[10px] font-bold">生活</span>
</a>
</nav>
</div>
</body>
</html>
