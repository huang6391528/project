<!DOCTYPE html>

<html lang="zh-CN">
<head>

<title>低碳健康饮食 - 低碳校园</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; font-family: 'PingFang SC', system-ui; }
        .app-container { width: 375px; height: 812px; background: #fafafa; margin: 20px auto; border-radius: 40px; border: 8px solid #333; position: relative; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25); }
        .scroll-content { height: calc(812px - 140px); overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-content::-webkit-scrollbar { display: none; }
        .asset-card { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .bottom-nav { height: 84px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; text-decoration: none; }
        .nav-item.active { color: #f97316; }
        .diet-card { background: #fff; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>
<div class="app-container">
<div class="px-6 pt-10 pb-2 flex justify-between items-center bg-white">
<span class="text-xl font-black text-gray-800 tracking-tighter">Eco<span class="text-orange-500">Meal</span></span>
<div class="text-[10px] font-bold text-orange-600 bg-orange-50 px-3 py-1 rounded-full uppercase">Canteen Open</div>
</div>
<div class="scroll-content px-4 pt-4">
<!-- 资产区 -->
<div class="p-5 rounded-[2rem] asset-card text-white shadow-lg relative overflow-hidden">
<div class="relative z-10 flex justify-between items-center">
<div>
<p class="text-[10px] opacity-70">连续光盘打卡</p>
<h2 class="text-3xl font-black mt-1">12 天</h2>
<p class="text-[10px] mt-1 bg-white/20 inline-block px-2 py-0.5 rounded-full">连续打卡奖励积分: +50</p>
</div>
<iconify-icon class="opacity-20" icon="mdi:bowl-mix-outline" width="64"></iconify-icon>
</div>
</div>
<!-- 自动化采集：LBS签到 -->
<div class="mt-6 bg-emerald-50 p-6 rounded-[2.5rem] border-2 border-emerald-100 text-center relative overflow-hidden">
<div class="absolute -left-4 -top-4 opacity-10"><iconify-icon icon="mdi:map-marker-radius" width="80"></iconify-icon></div>
<div class="relative z-10">
<h4 class="text-emerald-800 font-bold">食堂定位核验中</h4>
<p class="text-[10px] text-emerald-600 mt-1">第一学生食堂 · 已就绪</p>
<button class="mt-4 w-full bg-emerald-500 text-white py-3 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-emerald-200">一键签到打卡</button>
</div>
</div>
<!-- 饮食子功能 -->
<div class="mt-8 px-2">
<h4 class="font-bold text-gray-800 mb-4">饮食场景打卡</h4>
<div class="diet-card">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center">
<iconify-icon icon="mdi:camera-plus-outline" width="24"></iconify-icon>
</div>
<div>
<h5 class="text-sm font-bold">光盘行动</h5>
<p class="text-[10px] text-gray-400">AI拍照识别识别空盘情况</p>
</div>
</div>
<button class="bg-orange-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold">AI拍摄</button>
</div>
<div class="diet-card">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-green-100 text-green-600 rounded-xl flex items-center justify-center">
<iconify-icon icon="mdi:leaf" width="24"></iconify-icon>
</div>
<div>
<h5 class="text-sm font-bold">低碳素食</h5>
<p class="text-[10px] text-gray-400">选择全素餐/本地时令餐</p>
</div>
</div>
<input class="w-6 h-6 accent-emerald-500" type="checkbox"/>
</div>
<div class="diet-card">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center">
<iconify-icon icon="mdi:package-variant-minus" width="24"></iconify-icon>
</div>
<div>
<h5 class="text-sm font-bold">减外卖减塑</h5>
<p class="text-[10px] text-gray-400">今日未点外卖、拒绝一次性餐盒</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-emerald-500 flex items-center justify-center">
<iconify-icon class="text-emerald-500" icon="mdi:check"></iconify-icon>
</div>
</div>
<div class="diet-card">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
<iconify-icon icon="mdi:silverware-fork-knife" width="24"></iconify-icon>
</div>
<div>
<h5 class="text-sm font-bold">自带餐具</h5>
<p class="text-[10px] text-gray-400">自带碗筷及杯子用餐打卡</p>
</div>
</div>
<button class="bg-gray-100 text-gray-400 px-4 py-2 rounded-xl text-[10px] font-bold">已领</button>
</div>
<div class="diet-card">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-cyan-100 text-cyan-600 rounded-xl flex items-center justify-center">
<iconify-icon icon="mdi:water-check-outline" width="24"></iconify-icon>
</div>
<div>
<h5 class="text-sm font-bold">节水惜食</h5>
<p class="text-[10px] text-gray-400">节约用水、无浪费零食打卡</p>
</div>
</div>
<button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">记录</button>
</div>
</div>

</a>

<iconify-icon icon="mdi:bus-side" width="28"></iconify-icon>

<a class="nav-item active" href="diet.html">
<iconify-icon icon="mdi:silverware-variant" width="28"></iconify-icon>
<span class="text-[10px] font-bold">饮食</span>
</a>
<a class="nav-item" href="life.html">
<iconify-icon icon="mdi:home-heart" width="28"></iconify-icon>
<span class="text-[10px] font-bold">生活</span>
</a>
</nav>
