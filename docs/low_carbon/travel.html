<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>绿色低碳出行 - 低碳校园</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; font-family: 'PingFang SC', system-ui; }
        .app-container { width: 375px; height: 812px; background: #fafafa; margin: 20px auto; border-radius: 40px; border: 8px solid #333; position: relative; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25); }
        .scroll-content { height: calc(812px - 140px); overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-content::-webkit-scrollbar { display: none; }
        .asset-card { background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); }
        .bottom-nav { height: 84px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; text-decoration: none; }
        .nav-item.active { color: #2563eb; }
        .travel-card { background: #fff; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0f0f0; display: flex; align-items: center; gap: 16px; }
    </style>
</head>
<body>
<div class="app-container">
<div class="px-6 pt-10 pb-2 flex justify-between items-center bg-white">
<span class="text-xl font-black text-gray-800 tracking-tighter">Travel<span class="text-blue-500">Zero</span></span>
<div class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">2026.04.11</div>
</div>
<div class="scroll-content px-4 pt-4">
<!-- 资产区 -->
<div class="p-5 rounded-[2rem] asset-card text-white shadow-lg relative overflow-hidden">
<div class="relative z-10 flex justify-between">
<div>
<p class="text-[10px] opacity-70">本月出行减碳量</p>
<h2 class="text-3xl font-black mt-1">42.8 kg</h2>
<p class="text-[10px] mt-1 bg-white/20 inline-block px-2 py-0.5 rounded-full">里程超越 92% 同学</p>
</div>
<iconify-icon class="opacity-20" icon="mdi:train" width="64"></iconify-icon>
</div>
</div>
<!-- 自动化采集：轨迹监控 -->
<div class="mt-6 bg-blue-50 p-4 rounded-3xl flex items-center gap-4 border border-blue-100">
<div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white animate-pulse">
<iconify-icon icon="mdi:map-marker-distance" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h4 class="text-xs font-bold text-blue-800">校园LBS自动监测中</h4>
<p class="text-[8px] text-blue-500 mt-0.5">正在核验：学生活动中心 -&gt; 实验楼</p>
</div>
</div>
<!-- 出行项目 -->
<div class="mt-8 px-2">
<h4 class="font-bold text-gray-800 mb-4 flex justify-between">
<span>出行打卡选项</span>
<iconify-icon class="text-gray-300" icon="mdi:information-outline"></iconify-icon>
</h4>
<div class="travel-card">
<div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:bus" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">公交地铁</h5>
<p class="text-[10px] text-gray-400">线路选择 · 乘车次数凭证</p>
</div>
<button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold">补录</button>
</div>
<div class="travel-card">
<div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:bicycle" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">共享单车/私车</h5>
<p class="text-[10px] text-gray-400">扫码自动记录公里数</p>
</div>
<button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">开启</button>
</div>
<div class="travel-card">
<div class="w-12 h-12 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:walk" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">步行通勤</h5>
<p class="text-[10px] text-gray-400">上下学通勤路径校验</p>
</div>
<button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold">核验</button>
</div>
<div class="travel-card">
<div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:account-group" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">拼车共享</h5>
<p class="text-[10px] text-gray-400">多人结伴奖励积分 x1.5</p>
</div>
<button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold">添加队友</button>
</div>
<div class="travel-card">
<div class="w-12 h-12 bg-cyan-100 text-cyan-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:scooter" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">新能源代步</h5>
<p class="text-[10px] text-gray-400">电车/滑板车合规打卡</p>
</div>
<button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold">认证</button>
</div>
<div class="travel-card">
<div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:bus-school" width="28"></iconify-icon>
</div>
<div class="flex-1">
<h5 class="text-sm font-bold">校车通勤</h5>
<p class="text-[10px] text-gray-400">扫码记录校内校车次数</p>
</div>
<button class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-[10px] font-bold">扫码</button>
</div>
</div>
</div>
<nav class="bottom-nav">
<a class="nav-item" href="index.html">
<iconify-icon icon="mdi:run-fast" width="28"></iconify-icon>
<span class="text-[10px] font-bold">运动</span>
</a>
<a class="nav-item active" href="travel.html">
<iconify-icon icon="mdi:bus-side" width="28"></iconify-icon>
<span class="text-[10px] font-bold">出行</span>
</a>
<a class="nav-item" href="diet.html">
<iconify-icon icon="mdi:silverware-variant" width="28"></iconify-icon>
<span class="text-[10px] font-bold">饮食</span>
</a>
<a class="nav-item" href="life.html">
<iconify-icon icon="mdi:home-heart" width="28"></iconify-icon>
<span class="text-[10px] font-bold">生活</span>
</a>
</nav>
</div>
</body>
</html>
