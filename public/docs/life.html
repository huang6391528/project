<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>生活学习打卡 - 低碳校园</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        body { background-color: #f3f4f6; font-family: 'PingFang SC', system-ui; }
        .app-container { width: 375px; height: 812px; background: #fafafa; margin: 20px auto; border-radius: 40px; border: 8px solid #333; position: relative; overflow: hidden; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.25); }
        .scroll-content { height: calc(812px - 140px); overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-content::-webkit-scrollbar { display: none; }
        .asset-card { background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%); }
        .bottom-nav { height: 84px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #eee; position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; text-decoration: none; }
        .nav-item.active { color: #7c3aed; }
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
        .grid-card { background: #fff; border-radius: 20px; padding: 16px; border: 1px solid #f0f0f0; }
    </style>
</head>
<body>
<div class="app-container">
<div class="px-6 pt-10 pb-2 flex justify-between items-center bg-white">
<span class="text-xl font-black text-gray-800 tracking-tighter">Life<span class="text-purple-500">Eco</span></span>
<div class="text-[10px] font-bold text-gray-400">2026.04.11</div>
</div>
<div class="scroll-content">
<!-- 资产区 -->
<div class="mx-4 mt-4 p-5 rounded-[2rem] asset-card text-white shadow-lg relative overflow-hidden">
<div class="relative z-10 flex justify-between">
<div>
<p class="text-[10px] opacity-70">学习生活低碳等级</p>
<h2 class="text-3xl font-black mt-1">LV.5</h2>
<p class="text-[10px] mt-1 bg-white/20 inline-block px-2 py-0.5 rounded-full">已回收旧物约 24.5kg</p>
</div>
<iconify-icon class="opacity-20" icon="mdi:book-open-page-variant" width="64"></iconify-icon>
</div>
</div>
<!-- 子功能页签 -->
<div class="flex gap-2 px-4 mt-6 overflow-x-auto no-scrollbar">
<span class="px-4 py-2 bg-purple-600 text-white rounded-full text-[10px] font-bold">全部功能</span>
<span class="px-4 py-2 bg-white text-gray-500 rounded-full text-[10px] font-bold border border-gray-100">旧物循环</span>
<span class="px-4 py-2 bg-white text-gray-500 rounded-full text-[10px] font-bold border border-gray-100">宿舍节能</span>
<span class="px-4 py-2 bg-white text-gray-500 rounded-full text-[10px] font-bold border border-gray-100">低碳学习</span>
</div>
<!-- 自动化采集：垃圾分类AI -->
<div class="mx-4 mt-6 bg-purple-50 p-5 rounded-3xl border border-purple-100 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-purple-600 text-white rounded-2xl flex items-center justify-center">
<iconify-icon icon="mdi:camera-goggles" width="28"></iconify-icon>
</div>
<div>
<h5 class="text-xs font-bold text-purple-800">垃圾分类AI核验</h5>
<p class="text-[8px] text-purple-600 mt-0.5">拍照识别并记录碳吸附</p>
</div>
</div>
<button class="bg-purple-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">去拍摄</button>
</div>
<!-- 打卡网格 -->
<div class="feature-grid">
<div class="grid-card">
<iconify-icon class="text-indigo-500 mb-2" icon="mdi:gift-outline" width="24"></iconify-icon>
<h6 class="text-xs font-bold">旧物捐赠</h6>
<p class="text-[8px] text-gray-400 mt-1">旧书/衣/家电上传</p>
<button class="mt-3 w-full border border-indigo-100 text-indigo-500 text-[9px] py-1.5 rounded-lg font-bold">去捐赠</button>
</div>
<div class="grid-card">
<iconify-icon class="text-emerald-500 mb-2" icon="mdi:bag-checked" width="24"></iconify-icon>
<h6 class="text-xs font-bold">环保购物</h6>
<p class="text-[8px] text-gray-400 mt-1">自带布袋/无包装</p>
<button class="mt-3 w-full border border-emerald-100 text-emerald-500 text-[9px] py-1.5 rounded-lg font-bold">打卡</button>
</div>
<div class="grid-card">
<iconify-icon class="text-green-500 mb-2" icon="mdi:flower-tulip-outline" width="24"></iconify-icon>
<h6 class="text-xs font-black text-gray-800">绿植养护</h6>
<p class="text-[8px] text-gray-400 mt-1">碳吸附实时记录</p>
<button class="mt-3 w-full border border-green-100 text-green-500 text-[9px] py-1.5 rounded-lg font-bold">记录</button>
</div>
<div class="grid-card">
<iconify-icon class="text-blue-500 mb-2" icon="mdi:book-education-outline" width="24"></iconify-icon>
<h6 class="text-xs font-black text-gray-800">低碳学习</h6>
<p class="text-[8px] text-gray-400 mt-1">无纸化/二手教材</p>
<button class="mt-3 w-full border border-blue-100 text-blue-500 text-[9px] py-1.5 rounded-lg font-bold">上传</button>
</div>
<div class="col-span-2 grid-card bg-gray-900 text-white relative overflow-hidden">
<div class="relative z-10 flex justify-between items-center">
<div>
<h6 class="font-bold">宿舍节能看板</h6>
<div class="flex gap-4 mt-2">
<div class="flex items-center gap-1">
<iconify-icon class="text-blue-400" icon="mdi:thermometer-minus"></iconify-icon>
<span class="text-[10px]">空调温控自律</span>
</div>
<div class="flex items-center gap-1">
<iconify-icon class="text-yellow-400" icon="mdi:weather-night"></iconify-icon>
<span class="text-[10px]">熄灯打卡</span>
</div>
</div>
</div>
<button class="bg-purple-600 text-white px-3 py-1.5 rounded-xl text-[9px] font-bold">节能打卡</button>
</div>
</div>
<div class="col-span-2 grid-card flex items-center gap-4">
<div class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center">
<iconify-icon class="text-gray-500" icon="mdi:trash-can-outline" width="24"></iconify-icon>
</div>
<div class="flex-1">
<h6 class="text-xs font-bold">无塑日常</h6>
<p class="text-[8px] text-gray-400">拒绝一次性吸管、水杯记录</p>
</div>
<div class="w-5 h-5 rounded-full border border-purple-500"></div>
</div>
</div>
</div>
<nav class="bottom-nav">
<a class="nav-item" href="index.html">
<iconify-icon icon="mdi:run-fast" width="28"></iconify-icon>
<span class="text-[10px] font-bold">运动</span>
</a>
<a class="nav-item" href="travel.html">
<iconify-icon icon="mdi:bus-side" width="28"></iconify-icon>
<span class="text-[10px] font-bold">出行</span>
</a>
<a class="nav-item" href="diet.html">
<iconify-icon icon="mdi:silverware-variant" width="28"></iconify-icon>
<span class="text-[10px] font-bold">饮食</span>
</a>
<a class="nav-item active" href="life.html">
<iconify-icon icon="mdi:home-heart" width="28"></iconify-icon>
<span class="text-[10px] font-bold">生活</span>
</a>
</nav>
</div>
</body>
</html>
